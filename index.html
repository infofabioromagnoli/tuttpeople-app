<!doctype html><!-- v20260425-2140 -->
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e0166a">
<title>TuttiPeople</title>
<style>
  :root{
    --brand:#e0166a;
    --brand2:#18b04a;
    --brand-dark:#b81257;
    --brand-light:#fde4f0;
    --text:#080809;
    --text-2:#65676b;
    --text-3:#8a8d91;
    --bg:#f0f2f5;
    --card:#ffffff;
    --border:#ced0d4;
    --divider:#e4e6eb;
    --hover:#f2f2f2;
    --like:#e0166a;
    --heart:#f33e58;
    --green:#42b72a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.34;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
  body{overflow:hidden;}
  button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer;}
  input,textarea{font:inherit;color:inherit;}
  ::-webkit-scrollbar{display:none;} *{scrollbar-width:none;}
  a{color:inherit;text-decoration:none;}
  img{display:block;max-width:100%;}

  .app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);
    opacity:0;pointer-events:none;transition:opacity 100ms linear;}
  .screen.active{opacity:1;pointer-events:auto;}
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

  /* ===== Top bar ===== */
  .topbar{
    flex:0 0 auto;background:#fff;
    padding: max(env(safe-area-inset-top),8px) 12px 8px;
    display:flex;align-items:center;gap:10px;
    border-bottom:1px solid var(--divider);
  }
  .brand{display:flex;align-items:center;gap:6px;cursor:pointer;}
  .brand-mark{
    width:32px;height:32px;border-radius:9px;
    background:linear-gradient(135deg,var(--brand),var(--brand2));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 3px rgba(224,22,106,.3);
  }
  .brand-mark svg{width:18px;height:18px;color:#fff;}
  .brand-text{
    font-weight:900;font-size:22px;letter-spacing:-.5px;background:linear-gradient(90deg,var(--brand),var(--brand2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .topbar-spacer{flex:1;}
  .top-icon{
    width:36px;height:36px;border-radius:50%;
    background:var(--divider);
    display:flex;align-items:center;justify-content:center;
    color:var(--text);position:relative;
  }
  .top-icon:active{background:#d8dadf;}
  .top-icon svg{width:20px;height:20px;}
  .badge{
    position:absolute;top:-2px;right:-2px;
    min-width:18px;height:18px;border-radius:9px;
    background:#e02747;color:#fff;font-size:11px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
    padding:0 5px;border:2px solid #fff;
  }

  /* ===== Tab nav ===== */
  .tabnav{
    flex:0 0 auto;background:#fff;
    display:grid;grid-template-columns:repeat(5,1fr);
    border-bottom:1px solid var(--divider);
  }
  .tabnav button{
    height:48px;display:flex;align-items:center;justify-content:center;
    color:#65676b;position:relative;
  }
  .tabnav button.active{color:var(--brand);}
  .tabnav button.active::after{
    content:'';position:absolute;left:0;right:0;bottom:-1px;height:3px;background:var(--brand);
    border-radius:3px 3px 0 0;
  }
  .tabnav svg{width:26px;height:26px;}
  .tabnav .ind{
    position:absolute;top:6px;right:calc(50% - 22px);
    min-width:16px;height:16px;border-radius:8px;
    background:#e02747;color:#fff;font-size:10px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
    padding:0 4px;border:2px solid #fff;
  }

  /* ===== Composer ===== */
  .composer{
    background:#fff;padding:12px 14px 8px;
    border-bottom:1px solid var(--divider);
  }
  .composer-row{display:flex;align-items:center;gap:10px;}
  .composer .avatar{width:40px;height:40px;}
  .composer-input{
    flex:1;background:var(--bg);
    border-radius:999px;padding:10px 14px;
    color:#65676b;font-size:15px;
  }
  .composer-actions{
    display:grid;grid-template-columns:1fr 1fr 1fr;
    border-top:1px solid var(--divider);margin-top:10px;padding-top:6px;
  }
  .composer-actions button{
    height:38px;display:flex;align-items:center;justify-content:center;gap:6px;
    color:#65676b;font-weight:600;font-size:13.5px;
  }
  .composer-actions svg{width:20px;height:20px;}
  .ca-live{color:#e02747;}
  .ca-photo{color:#3fb27d;}
  .ca-feeling{color:#f5a623;}

  /* ===== Stories ===== */
  .stories{
    background:#fff;padding:10px 12px 12px;
    display:flex;gap:8px;overflow-x:auto;
    border-bottom:8px solid var(--bg);
  }
  .story{
    flex:0 0 auto;width:104px;height:170px;border-radius:14px;
    background:#ddd;position:relative;overflow:hidden;
    box-shadow:0 1px 2px rgba(0,0,0,.06);
  }
  .story img.bg{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  }
  .story::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,0) 50%,rgba(0,0,0,.55) 100%);
  }
  .story.create{background:#fff;border:1px solid var(--border);}
  .story.create .top{
    position:absolute;top:0;left:0;right:0;height:118px;overflow:hidden;
  }
  .story.create .top img{width:100%;height:100%;object-fit:cover;}
  .story.create .bottom{
    position:absolute;left:0;right:0;bottom:0;height:52px;background:#fff;
    text-align:center;font-size:12px;font-weight:600;
    padding:18px 6px 6px;color:var(--text);
  }
  .story.create::after{content:none;}
  .story.create .plus{
    position:absolute;top:104px;left:50%;transform:translateX(-50%);
    width:30px;height:30px;border-radius:50%;background:var(--brand);
    color:#fff;display:flex;align-items:center;justify-content:center;
    border:3px solid #fff;font-size:18px;font-weight:700;line-height:1;z-index:2;
  }
  .story .ring{
    position:absolute;top:8px;left:8px;
    width:36px;height:36px;border-radius:50%;
    border:3px solid var(--brand);
    background-color:#fff;overflow:hidden;z-index:2;
  }
  .story .ring img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .story .label{
    position:absolute;left:8px;right:8px;bottom:8px;
    color:#fff;font-size:12px;font-weight:600;
    text-shadow:0 1px 2px rgba(0,0,0,.6);
    line-height:1.2;z-index:2;
  }

  /* ===== Posts ===== */
  .feed{padding:0 0 24px;}
  .post{
    background:#fff;margin-bottom:8px;
    padding:12px 0 4px;
  }
  .post-head{
    display:flex;align-items:center;gap:10px;
    padding:0 14px 8px;
  }
  .avatar{
    width:40px;height:40px;border-radius:50%;
    flex:0 0 auto;overflow:hidden;
    background:#dcdcdc;
  }
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .avatar.lg{width:148px;height:148px;}
  .avatar.md{width:60px;height:60px;}
  .avatar.sm{width:32px;height:32px;}
  .post-who{flex:1;min-width:0;}
  .post-name{font-weight:700;font-size:15px;color:var(--text);
    display:flex;align-items:center;gap:5px;}
  .post-name .verified{
    width:14px;height:14px;color:var(--brand);flex:0 0 auto;
  }
  .post-meta{font-size:12px;color:var(--text-2);margin-top:1px;
    display:flex;align-items:center;gap:4px;}
  .post-meta svg{width:11px;height:11px;}
  .post-more{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--text-2);
  }
  .post-more:active{background:var(--hover);}
  .post-text{
    font-size:15px;line-height:1.4;color:var(--text);
    padding:0 14px 10px;
    white-space:pre-line;
  }
  .post-media{
    width:100%;background:#e4e6eb;display:block;
    aspect-ratio: 4/3;object-fit:cover;
  }
  .post-media-grid2{
    display:grid;grid-template-columns:1fr 1fr;gap:2px;
  }
  .post-media-grid2 img{
    width:100%;aspect-ratio:1;object-fit:cover;display:block;
  }
  .post-stats{
    padding:8px 14px 6px;
    display:flex;align-items:center;justify-content:space-between;
    font-size:13px;color:var(--text-2);
  }
  .reacts{display:flex;align-items:center;gap:6px;}
  .react-pill{
    width:20px;height:20px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    border:2px solid #fff;margin-left:-6px;
  }
  .react-pill:first-child{margin-left:0;}
  .react-like{background:linear-gradient(180deg,#2196f3,#0866ff);}
  .react-heart{background:linear-gradient(180deg,#ff5b6e,#e02747);}
  .react-haha{background:linear-gradient(180deg,#f7d24a,#e8b923);}
  .react-pill svg{width:10px;height:10px;color:#fff;}

  .post-actions{
    display:grid;grid-template-columns:1fr 1fr 1fr;
    border-top:1px solid var(--divider);
    margin:0 14px;
  }
  .post-actions button{
    height:42px;display:flex;align-items:center;justify-content:center;gap:8px;
    color:#65676b;font-weight:600;font-size:14px;
    border-radius:6px;
  }
  .post-actions button:active{background:var(--hover);}
  .post-actions svg{width:20px;height:20px;}
  .post-actions button.liked{color:var(--brand);}

  /* ===== Sponsored / Suggestion blocks ===== */
  .suggested{
    background:#fff;margin-bottom:8px;padding:12px 0 14px;
  }
  .suggested-title{
    padding:0 14px 8px;font-weight:700;font-size:16px;color:var(--text);
    display:flex;align-items:center;justify-content:space-between;
  }
  .suggested-title .more-link{font-size:13px;color:var(--brand);font-weight:600;}
  .suggested-rail{
    display:flex;gap:10px;overflow-x:auto;padding:0 14px;
  }
  .suggest-card{
    flex:0 0 auto;width:160px;border:1px solid var(--divider);border-radius:10px;
    overflow:hidden;background:#fff;
  }
  .suggest-card .ph{
    width:100%;aspect-ratio:1;background:#e4e6eb;
  }
  .suggest-card .ph img{width:100%;height:100%;object-fit:cover;}
  .suggest-card .body{padding:8px 10px 10px;}
  .suggest-card .nm{font-weight:700;font-size:14px;color:var(--text);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .suggest-card .sub{font-size:12px;color:var(--text-2);margin-top:2px;}
  .suggest-card .add-btn{
    width:100%;margin-top:8px;background:var(--brand-light);color:var(--brand);
    font-weight:700;font-size:13.5px;padding:7px 0;border-radius:6px;
    display:flex;align-items:center;justify-content:center;gap:5px;
  }
  .suggest-card .add-btn svg{width:14px;height:14px;}

  .sponsored-tag{
    font-size:12px;color:var(--text-2);padding:0 14px 6px;font-weight:600;
  }
  .sponsored-card{
    margin:0 14px;border:1px solid var(--divider);border-radius:10px;overflow:hidden;background:#fff;
  }
  .sponsored-card .img{width:100%;aspect-ratio:1.91/1;object-fit:cover;display:block;}
  .sponsored-card .body{padding:10px 12px;display:flex;align-items:center;gap:10px;}
  .sponsored-card .body .meta{flex:1;min-width:0;}
  .sponsored-card .meta .domain{font-size:11.5px;color:var(--text-2);text-transform:uppercase;letter-spacing:.4px;}
  .sponsored-card .meta .ttl{font-weight:700;font-size:14.5px;color:var(--text);margin-top:1px;}
  .sponsored-card .body .cta{
    background:var(--divider);color:var(--text);font-weight:700;font-size:13px;
    padding:7px 12px;border-radius:6px;
  }

  /* ===== Search ===== */
  .search-header{
    flex:0 0 auto;background:#fff;
    padding: max(env(safe-area-inset-top),10px) 10px 10px;
    display:flex;align-items:center;gap:6px;
    border-bottom:1px solid var(--divider);
  }
  .back-btn{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--text);
  }
  .back-btn:active{background:var(--hover);}
  .search-box{
    flex:1;display:flex;align-items:center;gap:8px;
    background:var(--bg);border-radius:999px;padding:8px 14px;
  }
  .search-box svg{width:16px;height:16px;color:var(--text-2);flex:0 0 auto;}
  .search-box input{border:0;outline:0;background:transparent;width:100%;font-size:15px;}
  .search-results{padding:0;background:#fff;}
  .result{
    display:flex;align-items:center;gap:12px;
    padding:9px 14px;cursor:pointer;
  }
  .result:active{background:var(--hover);}
  .result-body{flex:1;min-width:0;}
  .result-name{font-weight:600;font-size:15px;color:var(--text);}
  .result-sub{font-size:13px;color:var(--text-2);margin-top:1px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .result-friends{font-size:12.5px;color:var(--text-3);margin-top:1px;}
  .search-hint{padding:0;}
  .search-empty{padding:30px 24px;text-align:center;color:var(--text-2);font-size:14px;}
  .search-section-title{
    padding:14px 14px 6px;font-size:13px;font-weight:600;color:var(--text-2);
    background:#fff;
  }
  .recent-row{
    display:flex;align-items:center;gap:12px;padding:9px 14px;color:var(--text);
  }
  .recent-row .ic{
    width:36px;height:36px;border-radius:50%;background:var(--divider);
    display:flex;align-items:center;justify-content:center;color:var(--text-2);
  }
  .recent-row .ic svg{width:18px;height:18px;}
  .recent-row .lbl{flex:1;font-size:14.5px;}
  .recent-row .x{
    width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:var(--text-2);
  }
  .clear-link{
    color:var(--brand);font-weight:600;font-size:14px;padding:10px 14px;
    text-align:center;
  }

  /* ===== Profile ===== */
  .profile-header{
    flex:0 0 auto;background:#fff;
    padding: max(env(safe-area-inset-top),10px) 8px 10px;
    display:flex;align-items:center;gap:6px;
    border-bottom:1px solid var(--divider);
  }
  .profile-header .title{font-weight:700;font-size:17px;flex:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .profile-cover{
    height:160px;background:linear-gradient(135deg,#bcd0ea,#e6d3e9);
    overflow:hidden;
  }
  .profile-cover img{width:100%;height:100%;object-fit:cover;}
  .profile-id{
    background:#fff;padding:0 16px 14px;
    margin-top:-50px;position:relative;
  }
  .profile-avatar-wrap{
    width:148px;height:148px;border-radius:50%;
    background:#fff;padding:4px;
    box-shadow:0 2px 6px rgba(0,0,0,.08);
    display:inline-block;
  }
  .profile-id .avatar.lg{width:140px;height:140px;}
  .profile-name-row{display:flex;align-items:center;gap:6px;margin-top:10px;}
  .profile-name{
    font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.3px;
  }
  .verified-lg{width:20px;height:20px;color:var(--brand);}
  .profile-sub{font-size:14px;color:var(--text-2);margin-top:4px;}
  .profile-bio{font-size:15px;color:var(--text);margin-top:10px;line-height:1.4;}
  .profile-meta{margin-top:8px;}
  .profile-meta-row{
    display:flex;align-items:center;gap:8px;
    font-size:14px;color:var(--text-2);margin-top:5px;
  }
  .profile-meta-row svg{width:16px;height:16px;color:var(--text-2);flex:0 0 auto;}
  .profile-meta-row b{color:var(--text);font-weight:600;}
  .mutual-row{
    display:flex;align-items:center;gap:8px;margin-top:10px;
    font-size:13.5px;color:var(--text-2);
  }
  .mutual-stack{display:flex;}
  .mutual-stack .avatar.sm{
    width:24px;height:24px;border:2px solid #fff;margin-left:-8px;
  }
  .mutual-stack .avatar.sm:first-child{margin-left:0;}
  .profile-cta{
    display:flex;gap:8px;padding:14px 16px 14px;background:#fff;
    border-bottom:8px solid var(--bg);
  }
  .btn-primary{
    flex:1;background:var(--brand);color:#fff;
    font-weight:700;font-size:15px;padding:9px 12px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .btn-primary:active{background:var(--brand-dark);}
  .btn-primary svg{width:18px;height:18px;}
  .btn-ghost{
    flex:1;background:var(--divider);color:var(--text);
    font-weight:700;font-size:15px;padding:9px 12px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .btn-ghost:active{background:#d8dadf;}
  .btn-ghost svg{width:16px;height:16px;}
  .btn-icon{
    width:38px;flex:0 0 auto;background:var(--divider);border-radius:8px;
    display:flex;align-items:center;justify-content:center;color:var(--text);
  }
  .btn-icon:active{background:#d8dadf;}
  .btn-icon svg{width:18px;height:18px;}

  .profile-tabs{
    background:#fff;display:flex;gap:4px;
    padding:8px 8px 4px;border-bottom:1px solid var(--divider);
    overflow-x:auto;
  }
  .profile-tabs button{
    padding:8px 14px;font-size:14px;font-weight:600;color:var(--text-2);
    border-radius:6px;white-space:nowrap;
  }
  .profile-tabs button.active{color:var(--brand);background:var(--brand-light);}

  .profile-photos{
    background:#fff;padding:12px 14px;
    border-bottom:8px solid var(--bg);
  }
  .profile-photos .ttl{font-weight:700;font-size:16px;margin-bottom:8px;}
  .profile-photos-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:3px;
  }
  .profile-photos-grid div{
    aspect-ratio:1;background:#e4e6eb;overflow:hidden;
  }
  .profile-photos-grid img{width:100%;height:100%;object-fit:cover;}

  .profile-friends-block{
    background:#fff;padding:12px 14px;
    border-bottom:8px solid var(--bg);
  }
  .profile-friends-block .ttl{
    font-weight:700;font-size:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;
  }
  .profile-friends-block .sub{font-size:13px;color:var(--text-2);margin-bottom:10px;}
  .friend-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .friend-item{}
  .friend-item .ph{aspect-ratio:1;border-radius:8px;overflow:hidden;background:#e4e6eb;}
  .friend-item .ph img{width:100%;height:100%;object-fit:cover;}
  .friend-item .nm{font-size:13px;font-weight:600;margin-top:5px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .profile-post{
    background:#fff;margin-bottom:8px;padding:12px 0 4px;
  }
  .profile-post .head{display:flex;align-items:center;gap:10px;padding:0 14px 8px;}
  .profile-post .when{font-size:12px;color:var(--text-2);margin-top:1px;
    display:flex;align-items:center;gap:4px;}
  .profile-post .when svg{width:11px;height:11px;}
  .profile-post .text{font-size:15px;line-height:1.4;color:var(--text);padding:0 14px 10px;}

  /* ===== Chat ===== */
  .chat-header{
    flex:0 0 auto;background:#fff;
    padding: max(env(safe-area-inset-top),10px) 8px 10px;
    display:flex;align-items:center;gap:8px;
    border-bottom:1px solid var(--divider);
  }
  .chat-header .who{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
  .chat-header .avatar{width:36px;height:36px;}
  .chat-header .n{font-weight:700;font-size:15px;}
  .chat-header .s{font-size:11.5px;color:var(--text-2);margin-top:-1px;
    display:flex;align-items:center;gap:4px;}
  .chat-header .dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;}
  .chat-actions{display:flex;gap:2px;color:var(--brand);}
  .chat-actions button{
    width:38px;height:38px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
  }
  .chat-actions button:active{background:var(--hover);}
  .chat-actions svg{width:22px;height:22px;}

  .chat-body{
    flex:1;overflow-y:auto;padding:14px 10px 10px;
    background:#fff;
    display:flex;flex-direction:column;gap:3px;
  }
  .chat-day{
    align-self:center;font-size:11.5px;color:var(--text-2);
    padding:4px 10px;margin:6px 0;font-weight:600;
  }
  .bubble{
    max-width:78%;padding:8px 12px;
    font-size:15px;line-height:1.35;word-wrap:break-word;
    border-radius:18px;
  }

      <button data-action="noop" aria-label="Notifiche">${icon('i-bell')}<span class="ind">12</span></button>
      <button data-action="noop" aria-label="Menu">${icon('i-menu')}</button>
    </nav>
  `;

  // ===== HOME =====
  const renderHome = () => {
    const composer = `
      <div class="composer">
        <div class="composer-row">
          ${avatarHTML(avUrl(ME))}
          <div class="composer-input">A cosa stai pensando, ${ME.n.split(' ')[0]}?</div>
          <button class="top-icon" style="background:transparent;" data-action="noop" aria-label="Foto">${icon('i-image')}</button>
        </div>
        <div class="composer-actions">
          <button data-action="noop"><span class="ca-live">${icon('i-video')}</span> Diretta</button>
          <button data-action="noop"><span class="ca-photo">${icon('i-image')}</span> Foto</button>
          <button data-action="noop"><span class="ca-feeling">${icon('i-emoji')}</span> Stato</button>
        </div>
      </div>`;

    const stories = `
      <div class="stories">
        ${STORIES.map((s, idx) => {
          if (s.create) {
            return `<div class="story create">
              <div class="top"><img src="${avUrl(ME)}" alt=""></div>
              <div class="plus">+</div>
              <div class="bottom">Crea storia</div>
            </div>`;
          }
          return `<div class="story">
            <img class="bg" src="${picsum('story-' + idx, 220, 340)}" alt="">
            <div class="ring"><img src="${avUrl(s.person)}" alt=""></div>
            <div class="label">${s.name}</div>
          </div>`;
        }).join('')}
      </div>`;

    const renderMedia = (post) => {
      if (!post.media) return '';
      const w = post.mediaWide ? 800 : 600;
      const h = post.mediaWide ? 500 : 600;
      return `<img class="post-media" src="${picsum(post.media, w, h)}" alt="" loading="lazy">`;
    };

    const posts = FEED.map((p, idx) => {
      const liked = likedPosts.has(idx);
      const likeCount = p.likes + (liked ? 1 : 0);
      return `
      <article class="post">
        <div class="post-head">
          ${avatarHTML(avUrl(p.person))}
          <div class="post-who">
            <div class="post-name">${p.person.n}</div>
            <div class="post-meta">${p.meta} · ${icon('i-globe')}</div>
          </div>
          <button class="post-more" data-action="noop" aria-label="Altro">${icon('i-dots')}</button>
        </div>
        <div class="post-text">${p.text}</div>
        ${renderMedia(p)}
        <div class="post-stats">
          <div class="reacts">
            <span class="react-pill react-like">${icon('i-thumb-fill')}</span>
            <span class="react-pill react-heart">${icon('i-heart-fill')}</span>
            <span class="react-pill react-haha">${icon('i-haha')}</span>
            <span style="margin-left:6px;">${likeCount.toLocaleString('it-IT')}</span>
          </div>
          <div>${p.com} commenti · ${p.shares||0} cond.</div>
        </div>
        <div class="post-actions">
          <button data-action="like-post" data-post="${idx}" class="${liked?'liked':''}">
            ${icon(liked?'i-thumb-fill':'i-thumb')} Mi piace
          </button>
          <button data-action="noop">${icon('i-comment')} Commenta</button>
          <button data-action="noop">${icon('i-share')} Condividi</button>
        </div>
      </article>`;
    }).join('');

    // People you may know after 2nd post
    const suggestions = `
      <div class="suggested">
        <div class="suggested-title">
          <span>Persone che potresti conoscere</span>
          <span class="more-link">Vedi tutto</span>
        </div>
        <div class="suggested-rail">
          ${SUGGESTIONS.map(s => `
            <div class="suggest-card">
              <div class="ph"><img src="${avUrl(s)}" alt="" loading="lazy"></div>
              <div class="body">
                <div class="nm">${s.n}</div>
                <div class="sub">${s.c}</div>
                <button class="add-btn" data-action="noop">${icon('i-userplus')} Aggiungi</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;

    // Sponsored card
    const sponsored = `
      <div class="suggested">
        <div class="sponsored-tag">Sponsorizzato</div>
        <div class="sponsored-card">
          <img class="img" src="${picsum('sponsorscarpe', 800, 420)}" alt="">
          <div class="body">
            <div class="meta">
              <div class="domain">scarpenuove.it</div>
              <div class="ttl">Sneakers artigianali in pelle — saldi di stagione</div>
            </div>
            <button class="cta" data-action="noop">Acquista</button>
          </div>
        </div>
      </div>`;

    // Splice posts: 2 posts, suggestions, 2 posts, sponsored, rest
    const postsArr = FEED.map((p, idx) => {
      const liked = likedPosts.has(idx);
      const likeCount = p.likes + (liked ? 1 : 0);
      return `
      <article class="post">
        <div class="post-head">
          ${avatarHTML(avUrl(p.person))}
          <div class="post-who">
            <div class="post-name">${p.person.n}${p.isBirthday?' '+icon('i-cake','verified'):''}</div>
            <div class="post-meta">${p.meta} · ${icon('i-globe')}</div>
          </div>
          <button class="post-more" data-action="noop" aria-label="Altro">${icon('i-dots')}</button>
        </div>
        <div class="post-text">${p.text}</div>
        ${renderMedia(p)}
        <div class="post-stats">
          <div class="reacts">
            <span class="react-pill react-like">${icon('i-thumb-fill')}</span>
            <span class="react-pill react-heart">${icon('i-heart-fill')}</span>
            <span class="react-pill react-haha">${icon('i-haha')}</span>
            <span style="margin-left:6px;">${likeCount.toLocaleString('it-IT')}</span>
          </div>
          <div>${p.com} commenti · ${p.shares||0} cond.</div>
        </div>
        <div class="post-actions">
          <button data-action="like-post" data-post="${idx}" class="${liked?'liked':''}">
            ${icon(liked?'i-thumb-fill':'i-thumb')} Mi piace
          </button>
          <button data-action="noop">${icon('i-comment')} Commenta</button>
          <button data-action="noop">${icon('i-share')} Condividi</button>
        </div>
      </article>`;
    });

    const feedHtml = postsArr[0] + postsArr[1] + suggestions + postsArr[2] + sponsored + postsArr.slice(3).join('');

    return `
      <section class="screen active">
        ${topbar()}
        ${tabnav('home')}
        <div class="scroll">
          ${composer}
          ${stories}
          <div class="feed">${feedHtml}</div>
        </div>
      </section>
    `;
  };

  // ===== SEARCH =====
  const renderSearch = () => `
    <section class="screen active">
      <div class="search-header">
        <button class="back-btn" data-action="back-home" aria-label="Indietro">${icon('i-back')}</button>
        <div class="search-box">
          ${icon('i-search')}
          <input id="q" type="search" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Cerca su TuttiPeople">
        </div>
      </div>
      <div class="scroll">
        <div id="results" class="search-results"></div>
      </div>
    </section>
  `;

  const matchesQuery = (q) => {
    const s = q.trim().toLowerCase();
    if (!s) return [];
    const tokens = s.split(/\s+/);
    const matched = [];
    for (const p of PROFILES) {
      const hay = (p.n + ' ' + p.c + ' ' + (p.r || '')).toLowerCase();
      if (tokens.every(t => hay.includes(t))) matched.push(p);
      if (matched.length > 80) break;
    }
    // Sort: name match first
    matched.sort((a,b) => {
      const an = a.n.toLowerCase().startsWith(tokens[0]) ? 0 : 1;
      const bn = b.n.toLowerCase().startsWith(tokens[0]) ? 0 : 1;
      return an - bn;
    });
    return matched;
  };

  const profileFromHit = (p) => {
    if (p.luna) return LUNAS.find(L => L.id === 'luna' + p.luna);
    return null;
  };

  const paintSearch = (q) => {
    const host = document.getElementById('results');
    if (!host) return;
    const s = q.trim();
    if (!s) {
      // recent searches
      host.innerHTML = `
        <div class="search-section-title">Recenti</div>
        ${RECENTS.map(r => `
          <div class="recent-row">
            <div class="ic">${icon(r.type==='person'?'i-clock':'i-pin')}</div>
            <div class="lbl">${r.label}</div>
            <button class="x" data-action="noop">${icon('i-x')}</button>
          </div>
        `).join('')}
        <div class="clear-link" data-action="noop">Modifica cronologia</div>
      `;
      return;
    }
    const items = matchesQuery(s);
    if (!items.length) {
      host.innerHTML = '<div class="search-empty">Nessun risultato per "' + escapeHTML(s) + '".</div>';
      return;
    }
    host.innerHTML = `<div class="search-section-title">Persone (${items.length})</div>` + items.slice(0, 60).map(p => {
      const friendsLine = p.luna
        ? (p.luna === 1 ? '328 amici · 4 in comune' : p.luna === 2 ? '512 amici · 1 in comune' : '186 amici')
        : (p.f ? p.f + ' amici' : '');
      const url = avUrl(p);
      const lunaAttr = p.luna ? `data-profile="luna${p.luna}"` : '';
      return `
        <div class="result" ${lunaAttr}>
          <div class="avatar md"><img src="${url}" alt="" loading="lazy"></div>
          <div class="result-body">
            <div class="result-name">${p.n}</div>
            <div class="result-sub">${p.c} · ${p.r || ''}</div>
            <div class="result-friends">${friendsLine}</div>
          </div>
        </div>
      `;
    }).join('');
  };

  // ===== PROFILE =====
  const renderProfile = () => {
    const p = currentProfile; if (!p) return renderHome();
    const photosGrid = p.photos.map((item) => {
      const src = typeof item === 'string' ? picsum(p.id+'-photo-'+item, 300, 300) : item.url;
      return `<div><img src="${src}" alt="" loading="lazy"></div>`;
    }).join('');

    // 6 friends: 2 men + 4 women, full names
    const friendsPreview = [PROFILES[2], PROFILES[14], PROFILES[180], PROFILES[185], PROFILES[190], PROFILES[195]];
    const friendsHtml = friendsPreview.map(f => `
      <div class="friend-item">
        <div class="ph"><img src="${avUrl(f)}" alt="" loading="lazy"></div>
        <div class="nm">${f.n}</div>
      </div>
    `).join('');

    // Mutual friends differ per Luna so they feel realistic
    const mutualSets = {
      luna1: [PROFILES[181], PROFILES[183], PROFILES[5], PROFILES[20]],
      luna2: [PROFILES[188]],
      luna3: []
    };
    const mf = mutualSets[p.id] || [];
    const mutualHtml = mf.length > 0 ? `
      <div class="mutual-row">
        <div class="mutual-stack">
          ${mf.slice(0,3).map(f=>`<div class="avatar sm"><img src="${avUrl(f)}" alt=""></div>`).join('')}
        </div>
        <span>
          <b style="color:var(--text);">${mf[0].n.split(' ')[0]}</b>${mf[1]?`, <b style="color:var(--text);">${mf[1].n.split(' ')[0]}</b>`:''}
          e altri ${p.mutual - (mf[1]?2:1)} amici in comune
        </span>
      </div>
    ` : '';

    const posts = p.posts.map(x => `
      <article class="profile-post">
        <div class="head">
          ${avatarHTML(p.av)}
          <div class="post-who">
            <div class="post-name">${p.name}</div>
            <div class="when">${x.w} · ${icon('i-globe')}</div>
          </div>
          <button class="post-more" data-action="noop">${icon('i-dots')}</button>
        </div>
        <div class="text">${x.t}</div>
        ${x.mediaUrl ? `<img class="post-media" src="${x.mediaUrl}" alt="" loading="lazy">` : x.mediaSeed ? `<img class="post-media" src="${picsum(x.mediaSeed, x.mediaWide?800:600, x.mediaWide?500:600)}" alt="" loading="lazy">` : ''}
        <div class="post-stats">
          <div class="reacts">
            <span class="react-pill react-like">${icon('i-thumb-fill')}</span>
            <span class="react-pill react-heart">${icon('i-heart-fill')}</span>
            <span style="margin-left:6px;">${x.likes}</span>
          </div>
          <div>${x.com} commenti · ${x.shares} cond.</div>
        </div>
        <div class="post-actions">
          <button data-action="noop">${icon('i-thumb')} Mi piace</button>
          <button data-action="noop">${icon('i-comment')} Commenta</button>
          <button data-action="noop">${icon('i-share')} Condividi</button>
        </div>
      </article>
    `).join('');

    return `
      <section class="screen active">
        <div class="profile-header">
          <button class="back-btn" data-action="back-to-search" aria-label="Indietro">${icon('i-back')}</button>
          <div class="title">${p.name}</div>
          <button class="back-btn" data-action="noop">${icon('i-search')}</button>
          <button class="back-btn" data-action="noop">${icon('i-dots')}</button>
        </div>
        <div class="scroll">
          <div class="profile-cover"><img src="${picsum(p.cover.seed, 800, 320)}" alt=""></div>
          <div class="profile-id">
            <div class="profile-avatar-wrap">${avatarHTML(p.av, 'lg')}</div>
            <div class="profile-name-row">
              <div class="profile-name">${p.name}</div>
            </div>
            <div class="profile-sub">${p.friendsCount} amici${p.mutual>0?' · '+p.mutual+' in comune':''}</div>
            <div class="profile-bio">${p.bio.replace(/\n/g,'<br>')}</div>
            <div class="profile-meta">
              <div class="profile-meta-row">${icon('i-briefcase')} <span>Lavora come <b>${p.work}</b></span></div>
              <div class="profile-meta-row">${icon('i-graduation')} <span>Ha studiato a <b>${p.school}</b></span></div>
              <div class="profile-meta-row">${icon('i-pin')} <span>Vive a <b>${p.city}</b></span></div>
              <div class="profile-meta-row">${icon('i-home-o')} <span>Originaria di <b>${p.from}</b></span></div>
            </div>
            ${mutualHtml}
          </div>
          <div class="profile-cta">
            <button class="btn-ghost" data-action="noop">${icon('i-userplus')} Aggiungi</button>
            <button class="btn-primary" data-action="open-chat">${icon('i-msg-fill')} Messaggio</button>
            <button class="btn-icon" data-action="noop" aria-label="Altro">${icon('i-dots')}</button>
          </div>
          <div class="profile-tabs">
            <button class="active">Post</button>
            <button>Informazioni</button>
            <button>Foto</button>
            <button>Amici</button>
            <button>Video</button>
            <button>Check-in</button>
          </div>

          <div class="profile-photos">
            <div class="ttl" style="display:flex;justify-content:space-between;align-items:center;">
              <span>Foto</span>
              <span style="color:var(--blue);font-size:13.5px;font-weight:600;">Vedi tutto</span>
            </div>
            <div class="profile-photos-grid">${photosGrid}</div>
          </div>

          <div class="profile-friends-block">
            <div class="ttl">
              <span>Amici</span>
              <span style="color:var(--blue);font-size:13.5px;font-weight:600;">Vedi tutto</span>
            </div>
            <div class="sub">${p.friendsCount} amici${p.mutual>0?' · '+p.mutual+' in comune':''}</div>
            <div class="friend-grid">${friendsHtml}</div>
          </div>

          <div style="padding:12px 14px;background:#fff;font-weight:700;font-size:16px;border-bottom:1px solid var(--divider);">Post</div>
          ${posts}
        </div>
      </section>
    `;
  };

  // ===== CHAT =====
  const renderChat = () => {
    const p = currentProfile; if (!p) return renderHome();
    const msgs = loadMsgs(p);
    const msgHTML = msgs.map(m => `<div class="bubble ${m.from==='me'?'me':'them'}">${escapeHTML(m.text)}</div>`).join('');
    return `
      <section class="screen active">
        <div class="chat-header">
          <button class="back-btn" data-action="back-to-profile">${icon('i-back')}</button>
          <div class="who">
            ${avatarHTML(p.av)}
            <div>
              <div class="n">${p.name}</div>
              <div class="s"><span class="dot"></span> Attivo ora</div>
            </div>
          </div>
          <div class="chat-actions">
            <button data-action="noop">${icon('i-phone')}</button>
            <button data-action="noop">${icon('i-videocall')}</button>
            <button data-action="noop">${icon('i-info')}</button>
          </div>
        </div>
        <div class="chat-body" id="chatBody">${msgHTML || '<div class="chat-day">Inizia la conversazione</div>'}</div>
        <div class="chat-input">
          <div class="icons">
            <button data-action="noop">${icon('i-plus-circle')}</button>
            <button data-action="noop">${icon('i-camera')}</button>
            <button data-action="noop">${icon('i-image')}</button>
            <button data-action="noop">${icon('i-mic')}</button>
          </div>
          <div class="field">
            <textarea id="msgIn" rows="1" placeholder="Aa"></textarea>
            <button class="send-btn" data-action="noop" aria-label="Sticker" style="color:var(--text-2)">${icon('i-sticker')}</button>
          </div>
          <button class="send-btn" id="sendBtn" aria-label="Invia">${icon('i-send')}</button>
        </div>
      </section>
    `;
  };

  // ===== Render + bind =====
  const render = () => {
    let html = '';
    switch(screen){
      case 'search':  html = renderSearch();  break;
      case 'profile': html = renderProfile(); break;
      case 'chat':    html = renderChat();    break;
      default:        html = renderHome();
    }
    app.innerHTML = html;
    bind();
    afterRender();
  };

  const afterRender = () => {
    if (screen === 'search') {
      const input = document.getElementById('q');
      if (input) {
        input.value = lastSearchQuery;
        input.addEventListener('input', e => { lastSearchQuery = e.target.value; paintSearch(e.target.value); });
        paintSearch(lastSearchQuery);
        setTimeout(()=>{ try{ input.focus(); const v=input.value; input.value=''; input.value=v; }catch(e){} }, 50);
      }
    }
    if (screen === 'chat') {
      const body = document.getElementById('chatBody');
      if (body) body.scrollTop = body.scrollHeight;
      const ta = document.getElementById('msgIn');
      const btn = document.getElementById('sendBtn');
      if (ta) {
        ta.addEventListener('input', () => {
          ta.style.height = 'auto';
          ta.style.height = Math.min(ta.scrollHeight, 110) + 'px';
        });
        ta.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
      }
      if (btn) btn.addEventListener('click', sendMessage);
    }
  };

  const sendMessage = () => {
    const ta = document.getElementById('msgIn');
    if (!ta || !currentProfile) return;
    const text = ta.value.trim();
    if (!text) return;
    const msgs = loadMsgs(currentProfile);
    msgs.push({ from:'me', text, t: Date.now() });
    saveMsgs(currentProfile, msgs);
    const body = document.getElementById('chatBody');
    if (msgs.length === 1) body.innerHTML = '';
    const b = document.createElement('div');
    b.className = 'bubble me';
    b.textContent = text;
    body.appendChild(b);
    body.scrollTop = body.scrollHeight;
    ta.value = '';
    ta.style.height = 'auto';
    ta.focus();
  };

  const bind = () => { app.addEventListener('click', onTap, { once:true }); };

  const onTap = (e) => {
    bind();
    const resultEl = e.target.closest('[data-profile]');
    if (resultEl) {
      const id = resultEl.getAttribute('data-profile');
      const p = LUNAS.find(x => x.id === id);
      if (p) show('profile', { profile: p });
      return;
    }
    const actionEl = e.target.closest('[data-action]');
    if (!actionEl) return;
    const a = actionEl.getAttribute('data-action');
    switch(a){
      case 'home':            lastSearchQuery=''; show('home'); break;
      case 'go-search':       show('search'); break;
      case 'back-to-search':  show('search'); break;
      case 'back-home':       lastSearchQuery=''; show('home'); break;
      case 'back-to-profile': show('profile'); break;
      case 'open-chat':       show('chat'); break;
      case 'like-post': {
        const i = parseInt(actionEl.getAttribute('data-post'), 10);
        if (likedPosts.has(i)) likedPosts.delete(i); else likedPosts.add(i);
        render();
        break;
      }
      case 'noop': break;
    }
  };

  document.addEventListener('submit', e => e.preventDefault());
  document.addEventListener('dragstart', e => e.preventDefault());

  render();
})();
</script>
</body>
</html>
