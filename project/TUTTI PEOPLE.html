<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>TUTTI PEOPLE</title>
<style>
  :root{
    --brand:#8b2fb5;         /* primary magenta-purple */
    --brand-2:#c738a3;       /* magenta accent */
    --brand-grad: linear-gradient(135deg,#8b2fb5 0%,#c738a3 100%);
    --ink:#1a1220;
    --ink-2:#4a3d55;
    --muted:#8b8396;
    --line:#ece6f1;
    --line-2:#f5f1f7;
    --bg:#ffffff;
    --bg-soft:#faf7fc;
    --chip:#f1e9f7;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:#fff;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.35;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
  }
  body{overflow:hidden;}
  button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer;}
  input,textarea{font:inherit;color:inherit;}
  ::-webkit-scrollbar{display:none;}
  *{scrollbar-width:none;}
  a{color:inherit;text-decoration:none;}
  img{display:block;max-width:100%;}

  .app{
    position:fixed;inset:0;
    display:flex;flex-direction:column;
    background:#fff;
    overflow:hidden;
  }

  /* ===== Screens ===== */
  .screen{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    background:#fff;
    opacity:0;pointer-events:none;
    transition:opacity 120ms linear;
  }
  .screen.active{opacity:1;pointer-events:auto;}
  .scroll{
    flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  }

  /* ===== Top bar ===== */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding: max(env(safe-area-inset-top),12px) 16px 10px;
    border-bottom:1px solid var(--line);
    background:#fff;
    flex:0 0 auto;
  }
  .logo{display:flex;align-items:center;gap:9px;cursor:pointer;}
  .logo-mark{
    width:28px;height:28px;border-radius:9px;
    background:var(--brand-grad);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(139,47,181,.25);
  }
  .logo-mark svg{width:16px;height:16px;}
  .logo-text{
    font-weight:800;letter-spacing:.3px;font-size:17px;
    background:var(--brand-grad);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .topbar .icon-btn{
    width:38px;height:38px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:var(--ink);
  }
  .topbar .icon-btn:active{background:var(--line-2);}

  /* ===== Bottom tab bar ===== */
  .tabbar{
    flex:0 0 auto;
    display:grid;grid-template-columns:repeat(5,1fr);
    border-top:1px solid var(--line);
    padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
    background:#fff;
  }
  .tab{
    display:flex;flex-direction:column;align-items:center;gap:2px;
    color:#9a91a8;font-size:10.5px;font-weight:600;letter-spacing:.2px;
    padding:6px 0 2px;
  }
  .tab svg{width:24px;height:24px;}
  .tab.active{color:var(--brand);}
  .tab.active svg path,.tab.active svg circle,.tab.active svg rect{stroke:var(--brand);}
  .tab.active .fillable{fill:var(--brand);}

  /* ===== FEED ===== */
  .feed{padding:10px 0 18px;}
  .post{
    padding:12px 16px 14px;
    border-bottom:8px solid var(--bg-soft);
  }
  .post:last-child{border-bottom:0;}
  .post-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .avatar{
    width:40px;height:40px;border-radius:50%;
    background:#ddd;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:15px;
    overflow:hidden;
    background-size:cover;background-position:center;
  }
  .avatar.lg{width:108px;height:108px;font-size:38px;}
  .avatar.md{width:56px;height:56px;font-size:20px;}
  .post-who{display:flex;flex-direction:column;}
  .post-name{font-weight:700;font-size:14.5px;color:var(--ink);}
  .post-meta{font-size:12px;color:var(--muted);margin-top:1px;}
  .post-text{font-size:15px;line-height:1.42;color:var(--ink-2);margin:2px 0 10px;}
  .post-media{
    height:180px;border-radius:14px;
    background:linear-gradient(135deg,#efe6f5,#f7e9f2);
  }
  .post-actions{
    display:flex;gap:22px;margin-top:10px;color:#9a91a8;font-size:13px;font-weight:600;
  }
  .post-actions span{display:inline-flex;align-items:center;gap:6px;}
  .post-actions svg{width:17px;height:17px;}

  /* ===== SEARCH ===== */
  .search-header{
    display:flex;align-items:center;gap:10px;
    padding: max(env(safe-area-inset-top),12px) 14px 10px;
    border-bottom:1px solid var(--line);
    background:#fff;flex:0 0 auto;
  }
  .back-btn{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--ink);
  }
  .back-btn:active{background:var(--line-2);}
  .search-box{
    flex:1;display:flex;align-items:center;gap:8px;
    background:var(--bg-soft);
    border:1px solid var(--line);
    border-radius:999px;
    padding:9px 14px;
  }
  .search-box svg{width:16px;height:16px;color:var(--muted);flex:0 0 auto;}
  .search-box input{
    border:0;outline:0;background:transparent;width:100%;font-size:15.5px;
  }
  .search-results{padding:6px 0 24px;}
  .result{
    display:flex;align-items:center;gap:12px;
    padding:10px 16px;
    cursor:pointer;
  }
  .result:active{background:var(--bg-soft);}
  .result-body{display:flex;flex-direction:column;min-width:0;}
  .result-name{font-weight:700;font-size:15.5px;color:var(--ink);}
  .result-sub{font-size:13px;color:var(--muted);margin-top:1px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;}
  .search-empty{
    padding:30px 24px;text-align:center;color:var(--muted);font-size:14px;
  }
  .search-hint{
    padding:24px;color:var(--muted);font-size:13.5px;
  }
  .search-hint b{color:var(--ink);font-weight:700;}

  /* ===== PROFILE ===== */
  .profile-header{
    display:flex;align-items:center;gap:8px;
    padding: max(env(safe-area-inset-top),12px) 14px 10px;
    border-bottom:1px solid var(--line);
    background:#fff;flex:0 0 auto;
  }
  .profile-header .title{font-weight:700;font-size:16px;}
  .profile-top{
    padding:18px 20px 6px;
    display:flex;flex-direction:column;align-items:center;text-align:center;
  }
  .profile-top .avatar.lg{
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    border:3px solid #fff;
    outline:2px solid var(--line);
  }
  .profile-name{font-size:22px;font-weight:800;margin-top:12px;letter-spacing:-.2px;}
  .profile-loc{font-size:13.5px;color:var(--muted);margin-top:3px;}
  .profile-bio{
    font-size:14.5px;color:var(--ink-2);margin:10px 18px 0;line-height:1.42;
  }
  .profile-cta{
    display:flex;gap:10px;padding:16px 20px 6px;
  }
  .btn-primary{
    flex:1;background:var(--brand-grad);color:#fff;
    font-weight:700;font-size:15px;letter-spacing:.2px;
    padding:13px 16px;border-radius:12px;
    box-shadow:0 3px 10px rgba(139,47,181,.25);
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn-primary:active{filter:brightness(.95);}
  .btn-primary svg{width:18px;height:18px;}
  .btn-ghost{
    flex:0 0 auto;padding:13px 14px;border-radius:12px;
    background:var(--chip);color:var(--brand);font-weight:700;font-size:14px;
  }
  .profile-divider{
    border-top:8px solid var(--bg-soft);
    margin-top:14px;
  }
  .profile-posts-title{
    font-size:12px;font-weight:700;letter-spacing:1.2px;
    color:var(--muted);text-transform:uppercase;
    padding:14px 20px 4px;
  }
  .profile-post{
    padding:12px 20px 14px;
    border-bottom:1px solid var(--line);
    font-size:15px;color:var(--ink-2);line-height:1.42;
  }
  .profile-post:last-child{border-bottom:0;}
  .profile-post .when{
    display:block;font-size:11.5px;color:var(--muted);
    margin-top:6px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;
  }

  /* ===== CHAT ===== */
  .chat-header{
    display:flex;align-items:center;gap:10px;
    padding: max(env(safe-area-inset-top),12px) 14px 10px;
    border-bottom:1px solid var(--line);background:#fff;flex:0 0 auto;
  }
  .chat-header .who{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
  .chat-header .avatar{width:34px;height:34px;font-size:13px;}
  .chat-header .n{font-weight:700;font-size:15px;}
  .chat-header .s{font-size:11.5px;color:var(--muted);margin-top:-1px;}
  .chat-body{
    flex:1;overflow-y:auto;padding:14px 12px 10px;
    background:var(--bg-soft);
    display:flex;flex-direction:column;gap:6px;
  }
  .bubble{
    max-width:78%;padding:9px 13px;border-radius:18px;
    font-size:15px;line-height:1.35;word-wrap:break-word;
  }
  .bubble.me{
    align-self:flex-end;background:var(--brand-grad);color:#fff;
    border-bottom-right-radius:6px;
    box-shadow:0 1px 2px rgba(139,47,181,.2);
  }
  .bubble.them{
    align-self:flex-start;background:#fff;color:var(--ink);
    border:1px solid var(--line);
    border-bottom-left-radius:6px;
  }
  .chat-input{
    flex:0 0 auto;
    display:flex;align-items:flex-end;gap:8px;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);background:#fff;
  }
  .chat-input textarea{
    flex:1;resize:none;border:1px solid var(--line);
    background:var(--bg-soft);
    border-radius:20px;padding:10px 14px;
    font-size:15px;line-height:1.35;
    max-height:110px;min-height:40px;outline:none;
  }
  .chat-input textarea:focus{border-color:#d9c7e4;background:#fff;}
  .send-btn{
    width:40px;height:40px;border-radius:50%;
    background:var(--brand-grad);color:#fff;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(139,47,181,.25);
    flex:0 0 auto;
  }
  .send-btn:disabled{opacity:.4;cursor:default;}
  .send-btn svg{width:18px;height:18px;}

  .av-1{background:linear-gradient(135deg,#f19a5a,#e05d8a);}

<script>
(() => {
  'use strict';

  // ---------- Data ----------
  const ME = { name: 'Stefano', initial: 'S', avClass: 'av-s' };

  const LUNAS = [
    { id:'luna1', name:'Luna Costante', city:'Milano',  role:'Graphic designer',
      av:'av-1', initials:'LC',
      bio:'Graphic designer @ studio creativo. Amo il caffè e le tipografie.',
      posts:[
        { t:'Nuova identità per un piccolo torrefattore di quartiere. Finalmente consegnata ✍️', w:'2 giorni fa' },

        { t:'Milano a novembre è un Pantone 432C.', w:'3 settimane fa' }
      ]
    },
    { id:'luna2', name:'Luna Costante', city:'Torino', role:'Studentessa',
      av:'av-2', initials:'LC',
      bio:'Studentessa di lettere. Libri, concerti, gatti.',
      posts:[
        { t:'Finita la sessione. Ora tre giorni di sonno e romanzi russi.', w:'ieri' },
        { t:'Stasera concerto ai Murazzi. Se ci siete, fatevi sentire.', w:'4 giorni fa' }
      ]
    },
    { id:'luna3', name:'Luna Costante', city:'Pescara', role:'Artigiana',
      av:'av-3', initials:'LC',
      bio:'Artigiana. Decoro cuori sacri e oggetti votivi. Mare e mani.',
      posts:[
        { t:'Nuova serie di cuori votivi in lavorazione. Rame, smalti, pazienza.', w:'3 giorni fa' },
        { t:'La bottega è aperta sabato mattina. Venite a vedere.', w:'1 settimana fa' },
        { t:'Il mare d\'inverno è l\'unico maestro che conosco.', w:'2 settimane fa' }
      ]
    }
  ];

  const FEED = [
    { name:'Marta Bellini', meta:'Roma · 2 ore fa', av:'av-p1', ini:'MB',
      text:'Appena finito di leggere un libro che mi è rimasto addosso. Qualcuno ha consigli per il prossimo?',
      media:false },
    { name:'Giovanni Esposito', meta:'Napoli · 4 ore fa', av:'av-p2', ini:'GE',
      text:'Passeggiata lunga al porto. A volte bastano due ore di cammino.',
      media:true },
    { name:'Chiara Venturi', meta:'Bologna · ieri', av:'av-p3', ini:'CV',
      text:'Torta di mele della nonna, terza volta in un mese. Nessuno si lamenta.',
      media:false },
    { name:'Luca Ferraro', meta:'Genova · ieri', av:'av-p4', ini:'LF',
      text:'Finalmente ho sistemato la bici. Domani si parte presto, direzione entroterra.',
      media:true },
    { name:'Silvia Marchetti', meta:'Firenze · 2 giorni fa', av:'av-p5', ini:'SM',
      text:'Piccolo aggiornamento dal laboratorio: tre pezzi nuovi quasi pronti.',
      media:false }
  ];

  // ---------- App state ----------
  const app = document.getElementById('app');
  let screen = 'home';
  let currentProfile = null;

  // ---------- Helpers ----------
  const el = (html) => {
    const t = document.createElement('template');
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  };
  const icon = (id, cls='') => `<svg class="${cls}"><use href="#${id}"/></svg>`;

  const avatarHTML = (cls, initials='') => {
    const hasImage = cls === 'av-3';
    return `<div class="avatar ${cls}">${hasImage ? '' : initials}</div>`;
  };

  const storageKey = (profile) => 'tp_chat_' + profile.name.replace(/\s+/g,'_') + '_' + profile.city;
  const loadMsgs = (p) => {
    try { return JSON.parse(localStorage.getItem(storageKey(p)) || '[]'); }
    catch(e){ return []; }
  };
  const saveMsgs = (p, arr) => {
    try { localStorage.setItem(storageKey(p), JSON.stringify(arr)); } catch(e){}
  };

  // ---------- Router ----------
  const show = (name, opts={}) => {
    screen = name;
    if (name === 'profile' || name === 'chat') currentProfile = opts.profile || currentProfile;
    render();
  };

  // ---------- Screens ----------
  const topbar = (activeTab='home') => `
    <div class="topbar">
      <div class="logo" data-action="home">
        <div class="logo-mark">${icon('i-logo')}</div>
        <div class="logo-text">TUTTI PEOPLE</div>
      </div>
      <button class="icon-btn" data-action="go-search" aria-label="Cerca">
        ${icon('i-search')}
      </button>
    </div>
  `;

  const tabbar = (active='home') => `
    <nav class="tabbar">
      <button class="tab ${active==='home'?'active':''}" data-action="home">${icon('i-home')}<span>Home</span></button>
      <button class="tab ${active==='search'?'active':''}" data-action="go-search">${icon('i-search')}<span>Ricerca</span></button>
      <button class="tab ${active==='bell'?'active':''}" data-action="noop">${icon('i-bell')}<span>Notifiche</span></button>
      <button class="tab ${active==='chat'?'active':''}" data-action="noop">${icon('i-chat')}<span>Messaggi</span></button>
      <button class="tab ${active==='me'?'active':''}" data-action="noop">${icon('i-user')}<span>Profilo</span></button>
    </nav>
  `;

  const renderHome = () => {
    const posts = FEED.map(p => `
      <article class="post">
        <div class="post-head">
          <div class="avatar ${p.av}">${p.ini}</div>
          <div class="post-who">
            <div class="post-name">${p.name}</div>
            <div class="post-meta">${p.meta}</div>
          </div>
        </div>
        <div class="post-text">${p.text}</div>
        ${p.media ? '<div class="post-media"></div>' : ''}
        <div class="post-actions">
          <span>${icon('i-heart')} 24</span>
          <span>${icon('i-msg')} 5</span>
          <span>${icon('i-share')}</span>
        </div>
      </article>
    `).join('');

    return `
      <section class="screen active">
        ${topbar()}
        <div class="scroll">
          <div class="feed">${posts}</div>
        </div>
        ${tabbar('home')}
      </section>
    `;
  };

  const renderSearch = () => {
    return `
      <section class="screen active">
        <div class="search-header">
          <button class="back-btn" data-action="home" aria-label="Indietro">${icon('i-back')}</button>
          <div class="search-box">
            ${icon('i-search')}
            <input id="q" type="search" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Cerca persone, luoghi, post">
          </div>
        </div>
        <div class="scroll">
          <div class="search-results" id="results"></div>
        </div>
        ${tabbar('search')}
      </section>
    `;
  };

  const matchesQuery = (q) => {
    const s = q.trim().toLowerCase();
    if (!s) return [];
    return LUNAS.filter(p => {
      const hay = (p.name + ' ' + p.city + ' ' + p.role).toLowerCase();
      return s.split(/\s+/).every(tok => hay.includes(tok));
    });
  };

  const paintSearch = (q) => {
    const host = document.getElementById('results');
    if (!host) return;
    const s = q.trim();
    if (!s) {
      host.innerHTML = '<div class="search-hint">Cerca persone per <b>nome</b> o <b>città</b>.</div>';
      return;
    }
    const items = matchesQuery(s);
    if (!items.length) {
      host.innerHTML = '<div class="search-empty">Nessun risultato.</div>';
      return;
    }
    host.innerHTML = items.map(p => `
      <div class="result" data-profile="${p.id}">
        ${avatarHTML(p.av, p.initials)}
        <div class="result-body">
          <div class="result-name">${p.name}</div>
          <div class="result-sub">${p.city} · ${p.role}</div>
        </div>
      </div>
    `).join('');
  };

  const renderProfile = () => {
    const p = currentProfile;
    if (!p) return renderHome();
    const posts = p.posts.map(x => `
      <div class="profile-post">
        ${x.t}
        <span class="when">${x.w}</span>
      </div>
    `).join('');
    return `
      <section class="screen active">
        <div class="profile-header">
          <button class="back-btn" data-action="back-to-search" aria-label="Indietro">${icon('i-back')}</button>
          <div class="title">Profilo</div>
        </div>
        <div class="scroll">
          <div class="profile-top">
            <div class="avatar lg ${p.av}">${p.av==='av-3'?'':p.initials}</div>
            <div class="profile-name">${p.name}</div>
            <div class="profile-loc">${p.city} · ${p.role}</div>
            <div class="profile-bio">${p.bio}</div>
          </div>
          <div class="profile-cta">
            <button class="btn-primary" data-action="open-chat">
              ${icon('i-msg')} Messaggio
            </button>
            <button class="btn-ghost" data-action="noop">Segui</button>
          </div>
          <div class="profile-divider"></div>
          <div class="profile-posts-title">Post</div>
          ${posts}
        </div>
      </section>
    `;
  };

  const renderChat = () => {
    const p = currentProfile;
    if (!p) return renderHome();
    const msgs = loadMsgs(p);
    const msgHTML = msgs.map(m => `
      <div class="bubble ${m.from==='me'?'me':'them'}">${escapeHTML(m.text)}</div>
    `).join('');
    return `
      <section class="screen active">
        <div class="chat-header">
          <button class="back-btn" data-action="back-to-profile" aria-label="Indietro">${icon('i-back')}</button>
          <div class="who">
            ${avatarHTML(p.av, p.initials)}
            <div>
              <div class="n">${p.name}</div>
              <div class="s">${p.city}</div>
            </div>
          </div>
        </div>
        <div class="chat-body" id="chatBody">${msgHTML}</div>
        <div class="chat-input">
          <textarea id="msgIn" rows="1" placeholder="Scrivi un messaggio"></textarea>
          <button class="send-btn" id="sendBtn" aria-label="Invia">${icon('i-send')}</button>
        </div>
      </section>
    `;
  };

  const escapeHTML = (s) => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  // ---------- Render + bindings ----------
  const render = () => {
    let html = '';
    switch(screen){
      case 'search':  html = renderSearch();  break;
      case 'profile': html = renderProfile(); break;
      case 'chat':    html = renderChat();    break;
      default:        html = renderHome();
    }
    app.innerHTML = html;
    bind();
    afterRender();
  };

  const afterRender = () => {
    if (screen === 'search') {
      const input = document.getElementById('q');
      if (input) {
        input.addEventListener('input', e => paintSearch(e.target.value));
        paintSearch('');
        setTimeout(()=>{ try{ input.focus(); }catch(e){} }, 50);
      }
    }
    if (screen === 'chat') {
      const body = document.getElementById('chatBody');
      if (body) body.scrollTop = body.scrollHeight;

      const ta = document.getElementById('msgIn');
      const btn = document.getElementById('sendBtn');
      if (ta) {
        ta.addEventListener('input', () => {
          ta.style.height = 'auto';
          ta.style.height = Math.min(ta.scrollHeight, 110) + 'px';
        });
        ta.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
          }
        });
      }
      if (btn) btn.addEventListener('click', sendMessage);
    }
  };

  const sendMessage = () => {
    const ta = document.getElementById('msgIn');
    if (!ta || !currentProfile) return;
    const text = ta.value.trim();
    if (!text) return;
    const msgs = loadMsgs(currentProfile);
    msgs.push({ from:'me', text, t: Date.now() });
    saveMsgs(currentProfile, msgs);

    const body = document.getElementById('chatBody');
    const b = document.createElement('div');
    b.className = 'bubble me';
    b.textContent = text;
    body.appendChild(b);
    body.scrollTop = body.scrollHeight;

    ta.value = '';
    ta.style.height = 'auto';
    ta.focus();
  };

  const bind = () => {
    app.addEventListener('click', onTap, { once:true });
  };

  const onTap = (e) => {
    // re-bind for next tap
    bind();

    const resultEl = e.target.closest('[data-profile]');
    if (resultEl) {
      const id = resultEl.getAttribute('data-profile');
      const p = LUNAS.find(x => x.id === id);
      if (p) show('profile', { profile: p });
      return;
    }

    const actionEl = e.target.closest('[data-action]');
    if (!actionEl) return;
    const a = actionEl.getAttribute('data-action');
    switch(a){
      case 'home':            show('home'); break;
      case 'go-search':       show('search'); break;
      case 'back-to-search':  show('search'); break;
      case 'back-to-profile': show('profile'); break;
      case 'open-chat':       show('chat'); break;
      case 'noop':            /* no-op by design */ break;
    }
  };

  // Prevent any accidental form submits / link navigations
  document.addEventListener('submit', e => e.preventDefault());
  document.addEventListener('dragstart', e => e.preventDefault());

  // Initial render
  render();
})();
</script>
</body>
</html>
