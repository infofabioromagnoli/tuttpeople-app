<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0866ff">
<title>TuttiPeople</title>
<style>
  :root{
    --blue:#0866ff;
    --blue-dark:#0658d8;
    --blue-light:#e7f0ff;
    --text:#080809;
    --text-2:#65676b;
    --text-3:#8a8d91;
    --bg:#f0f2f5;
    --card:#ffffff;
    --border:#ced0d4;
    --divider:#e4e6eb;
    --hover:#f2f2f2;
    --like:#0866ff;
    --heart:#f33e58;
    --green:#42b72a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.34;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
  body{overflow:hidden;}
  button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer;}
  input,textarea{font:inherit;color:inherit;}
  ::-webkit-scrollbar{display:none;} *{scrollbar-width:none;}
  a{color:inherit;text-decoration:none;}
  img{display:block;max-width:100%;}

  .app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);
    opacity:0;pointer-events:none;transition:opacity 100ms linear;}
  .screen.active{opacity:1;pointer-events:auto;}
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

  /* ===== Top bar ===== */
  .topbar{
    flex:0 0 auto;background:#fff;
    padding: max(env(safe-area-inset-top),8px) 12px 8px;
    display:flex;align-items:center;gap:10px;
    border-bottom:1px solid var(--divider);
  }
  .brand{display:flex;align-items:center;gap:6px;cursor:pointer;}
  .brand-mark{
    width:32px;height:32px;border-radius:9px;
    background:linear-gradient(135deg,#0866ff,#3b9eff);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 3px rgba(8,102,255,.3);
  }
  .brand-mark svg{width:18px;height:18px;color:#fff;}
  .brand-text{
    font-weight:900;font-size:22px;color:var(--blue);letter-spacing:-.5px;
  }
  .topbar-spacer{flex:1;}
  .top-icon{
    width:36px;height:36px;border-radius:50%;
    background:var(--divider);
    display:flex;align-items:center;justify-content:center;
    color:var(--text);position:relative;
  }
  .top-icon:active{background:#d8dadf;}
  .top-icon svg{width:20px;height:20px;}
  .badge{
    position:absolute;top:-2px;right:-2px;
    min-width:18px;height:18px;border-radius:9px;
    background:#e02747;color:#fff;font-size:11px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
    padding:0 5px;border:2px solid #fff;
  }

  /* ===== Tab nav ===== */
  .tabnav{
    flex:0 0 auto;background:#fff;
    display:grid;grid-template-columns:repeat(5,1fr);
    border-bottom:1px solid var(--divider);
  }
  .tabnav button{
    height:48px;display:flex;align-items:center;justify-content:center;
    color:#65676b;position:relative;
  }
  .tabnav button.active{color:var(--blue);}
  .tabnav button.active::after{
    content:'';position:absolute;left:0;right:0;bottom:-1px;height:3px;background:var(--blue);
    border-radius:3px 3px 0 0;
  }
  .tabnav svg{width:26px;height:26px;}
  .tabnav .ind{
    position:absolute;top:6px;right:calc(50% - 22px);
    min-width:16px;height:16px;border-radius:8px;
    background:#e02747;color:#fff;font-size:10px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
    padding:0 4px;border:2px solid #fff;
  }

  /* ===== Composer ===== */
  .composer{
    background:#fff;padding:12px 14px 8px;
    border-bottom:1px solid var(--divider);
  }
  .composer-row{display:flex;align-items:center;gap:10px;}
  .composer .avatar{width:40px;height:40px;}
  .composer-input{
    flex:1;background:var(--bg);
    border-radius:999px;padding:10px 14px;
    color:#65676b;font-size:15px;
  }
  .composer-actions{
    display:grid;grid-template-columns:1fr 1fr 1fr;
    border-top:1px solid var(--divider);margin-top:10px;padding-top:6px;
  }
  .composer-actions button{
    height:38px;display:flex;align-items:center;justify-content:center;gap:6px;
    color:#65676b;font-weight:600;font-size:13.5px;
  }
  .composer-actions svg{width:20px;height:20px;}
  .ca-live{color:#e02747;}
  .ca-photo{color:#3fb27d;}
  .ca-feeling{color:#f5a623;}

  /* ===== Stories ===== */
  .stories{
    background:#fff;padding:10px 12px 12px;
    display:flex;gap:8px;overflow-x:auto;
    border-bottom:8px solid var(--bg);
  }
  .story{
    flex:0 0 auto;width:104px;height:170px;border-radius:14px;
    background:#ddd;position:relative;overflow:hidden;
    box-shadow:0 1px 2px rgba(0,0,0,.06);
  }
  .story img.bg{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  }
  .story::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,0) 50%,rgba(0,0,0,.55) 100%);
  }
  .story.create{background:#fff;border:1px solid var(--border);}
  .story.create .top{
    position:absolute;top:0;left:0;right:0;height:118px;overflow:hidden;
  }
  .story.create .top img{width:100%;height:100%;object-fit:cover;}
  .story.create .bottom{
    position:absolute;left:0;right:0;bottom:0;height:52px;background:#fff;
    text-align:center;font-size:12px;font-weight:600;
    padding:18px 6px 6px;color:var(--text);
  }
  .story.create::after{content:none;}
  .story.create .plus{
    position:absolute;top:104px;left:50%;transform:translateX(-50%);
    width:30px;height:30px;border-radius:50%;background:var(--blue);
    color:#fff;display:flex;align-items:center;justify-content:center;
    border:3px solid #fff;font-size:18px;font-weight:700;line-height:1;z-index:2;
  }
  .story .ring{
    position:absolute;top:8px;left:8px;
    width:36px;height:36px;border-radius:50%;
    border:3px solid var(--blue);
    background-color:#fff;overflow:hidden;z-index:2;
  }
  .story .ring img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .story .label{
    position:absolute;left:8px;right:8px;bottom:8px;
    color:#fff;font-size:12px;font-weight:600;
    text-shadow:0 1px 2px rgba(0,0,0,.6);
    line-height:1.2;z-index:2;
  }

  /* ===== Posts ===== */
  .feed{padding:0 0 24px;}
  .post{
    background:#fff;margin-bottom:8px;
    padding:12px 0 4px;
  }
  .post-head{
    display:flex;align-items:center;gap:10px;
    padding:0 14px 8px;
  }
  .avatar{
    width:40px;height:40px;border-radius:50%;
    flex:0 0 auto;overflow:hidden;
    background:#dcdcdc;
  }
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .avatar.lg{width:148px;height:148px;}
  .avatar.md{width:60px;height:60px;}
  .avatar.sm{width:32px;height:32px;}
  .post-who{flex:1;min-width:0;}
  .post-name{font-weight:700;font-size:15px;color:var(--text);
    display:flex;align-items:center;gap:5px;}
  .post-name .verified{
    width:14px;height:14px;color:var(--blue);flex:0 0 auto;
  }
  .post-meta{font-size:12px;color:var(--text-2);margin-top:1px;
    display:flex;align-items:center;gap:4px;}
  .post-meta svg{width:11px;height:11px;}
  .post-more{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--text-2);
  }
  .post-more:active{background:var(--hover);}
  .post-text{
    font-size:15px;line-height:1.4;color:var(--text);
    padding:0 14px 10px;
    white-space:pre-line;
  }
  .post-media{
    width:100%;background:#e4e6eb;display:block;
    aspect-ratio: 4/3;object-fit:cover;
  }
  .post-media-grid2{
    display:grid;grid-template-columns:1fr 1fr;gap:2px;
  }
  .post-media-grid2 img{
    width:100%;aspect-ratio:1;object-fit:cover;display:block;
  }
  .post-stats{
    padding:8px 14px 6px;
    display:flex;align-items:center;justify-content:space-between;
    font-size:13px;color:var(--text-2);
  }
  .reacts{display:flex;align-items:center;gap:6px;}
  .react-pill{
    width:20px;height:20px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    border:2px solid #fff;margin-left:-6px;
  }
  .react-pill:first-child{margin-left:0;}
  .react-like{background:linear-gradient(180deg,#2196f3,#0866ff);}
  .react-heart{background:linear-gradient(180deg,#ff5b6e,#e02747);}
  .react-haha{background:linear-gradient(180deg,#f7d24a,#e8b923);}
  .react-pill svg{width:10px;height:10px;color:#fff;}

  .post-actions{
    display:grid;grid-template-columns:1fr 1fr 1fr;
    border-top:1px solid var(--divider);
    margin:0 14px;
  }
  .post-actions button{
    height:42px;display:flex;align-items:center;justify-content:center;gap:8px;
    color:#65676b;font-weight:600;font-size:14px;
    border-radius:6px;
  }
  .post-actions button:active{background:var(--hover);}
  .post-actions svg{width:20px;height:20px;}
  .post-actions button.liked{color:var(--blue);}

  /* ===== Sponsored / Suggestion blocks ===== */
  .suggested{
    background:#fff;margin-bottom:8px;padding:12px 0 14px;
  }
  .suggested-title{
    padding:0 14px 8px;font-weight:700;font-size:16px;color:var(--text);
    display:flex;align-items:center;justify-content:space-between;
  }
  .suggested-title .more-link{font-size:13px;color:var(--blue);font-weight:600;}
  .suggested-rail{
    display:flex;gap:10px;overflow-x:auto;padding:0 14px;
  }
  .suggest-card{
    flex:0 0 auto;width:160px;border:1px solid var(--divider);border-radius:10px;
    overflow:hidden;background:#fff;
  }
  .suggest-card .ph{
    width:100%;aspect-ratio:1;background:#e4e6eb;
  }
  .suggest-card .ph img{width:100%;height:100%;object-fit:cover;}
  .suggest-card .body{padding:8px 10px 10px;}
  .suggest-card .nm{font-weight:700;font-size:14px;color:var(--text);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .suggest-card .sub{font-size:12px;color:var(--text-2);margin-top:2px;}
  .suggest-card .add-btn{
    width:100%;margin-top:8px;background:var(--blue-light);color:var(--blue);
    font-weight:700;font-size:13.5px;padding:7px 0;border-radius:6px;
    display:flex;align-items:center;justify-content:center;gap:5px;
  }
  .suggest-card .add-btn svg{width:14px;height:14px;}

  .sponsored-tag{
    font-size:12px;color:var(--text-2);padding:0 14px 6px;font-weight:600;
  }
  .sponsored-card{
    margin:0 14px;border:1px solid var(--divider);border-radius:10px;overflow:hidden;background:#fff;
  }
  .sponsored-card .img{width:100%;aspect-ratio:1.91/1;object-fit:cover;display:block;}
  .sponsored-card .body{padding:10px 12px;display:flex;align-items:center;gap:10px;}
  .sponsored-card .body .meta{flex:1;min-width:0;}
  .sponsored-card .meta .domain{font-size:11.5px;color:var(--text-2);text-transform:uppercase;letter-spacing:.4px;}
  .sponsored-card .meta .ttl{font-weight:700;font-size:14.5px;color:var(--text);margin-top:1px;}
  .sponsored-card .body .cta{
    background:var(--divider);color:var(--text);font-weight:700;font-size:13px;
    padding:7px 12px;border-radius:6px;
  }

  /* ===== Search ===== */
  .search-header{
    flex:0 0 auto;background:#fff;
    padding: max(env(safe-area-inset-top),10px) 10px 10px;
    display:flex;align-items:center;gap:6px;
    border-bottom:1px solid var(--divider);
  }
  .back-btn{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--text);
  }
  .back-btn:active{background:var(--hover);}
  .search-box{
    flex:1;display:flex;align-items:center;gap:8px;
    background:var(--bg);border-radius:999px;padding:8px 14px;
  }
  .search-box svg{width:16px;height:16px;color:var(--text-2);flex:0 0 auto;}
  .search-box input{border:0;outline:0;background:transparent;width:100%;font-size:15px;}
  .search-results{padding:0;background:#fff;}
  .result{
    display:flex;align-items:center;gap:12px;
    padding:9px 14px;cursor:pointer;
  }
  .result:active{background:var(--hover);}
  .result-body{flex:1;min-width:0;}
  .result-name{font-weight:600;font-size:15px;color:var(--text);}
  .result-sub{font-size:13px;color:var(--text-2);margin-top:1px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .result-friends{font-size:12.5px;color:var(--text-3);margin-top:1px;}
  .search-hint{padding:0;}
  .search-empty{padding:30px 24px;text-align:center;color:var(--text-2);font-size:14px;}
  .search-section-title{
    padding:14px 14px 6px;font-size:13px;font-weight:600;color:var(--text-2);
    background:#fff;
  }
  .recent-row{
    display:flex;align-items:center;gap:12px;padding:9px 14px;color:var(--text);
  }
  .recent-row .ic{
    width:36px;height:36px;border-radius:50%;background:var(--divider);
    display:flex;align-items:center;justify-content:center;color:var(--text-2);
  }
  .recent-row .ic svg{width:18px;height:18px;}
  .recent-row .lbl{flex:1;font-size:14.5px;}
  .recent-row .x{
    width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:var(--text-2);
  }
  .clear-link{
    color:var(--blue);font-weight:600;font-size:14px;padding:10px 14px;
    text-align:center;
  }

  /* ===== Profile ===== */
  .profile-header{
    flex:0 0 auto;background:#fff;
    padding: max(env(safe-area-inset-top),10px) 8px 10px;
    display:flex;align-items:center;gap:6px;
    border-bottom:1px solid var(--divider);
  }
  .profile-header .title{font-weight:700;font-size:17px;flex:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .profile-cover{
    height:160px;background:linear-gradient(135deg,#bcd0ea,#e6d3e9);
    overflow:hidden;
  }
  .profile-cover img{width:100%;height:100%;object-fit:cover;}
  .profile-id{
    background:#fff;padding:0 16px 14px;
    margin-top:-50px;position:relative;
  }
  .profile-avatar-wrap{
    width:148px;height:148px;border-radius:50%;
    background:#fff;padding:4px;
    box-shadow:0 2px 6px rgba(0,0,0,.08);
    display:inline-block;
  }
  .profile-id .avatar.lg{width:140px;height:140px;}
  .profile-name-row{display:flex;align-items:center;gap:6px;margin-top:10px;}
  .profile-name{
    font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.3px;
  }
  .verified-lg{width:20px;height:20px;color:var(--blue);}
  .profile-sub{font-size:14px;color:var(--text-2);margin-top:4px;}
  .profile-bio{font-size:15px;color:var(--text);margin-top:10px;line-height:1.4;}
  .profile-meta{margin-top:8px;}
  .profile-meta-row{
    display:flex;align-items:center;gap:8px;
    font-size:14px;color:var(--text-2);margin-top:5px;
  }
  .profile-meta-row svg{width:16px;height:16px;color:var(--text-2);flex:0 0 auto;}
  .profile-meta-row b{color:var(--text);font-weight:600;}
  .mutual-row{
    display:flex;align-items:center;gap:8px;margin-top:10px;
    font-size:13.5px;color:var(--text-2);
  }
  .mutual-stack{display:flex;}
  .mutual-stack .avatar.sm{
    width:24px;height:24px;border:2px solid #fff;margin-left:-8px;
  }
  .mutual-stack .avatar.sm:first-child{margin-left:0;}
  .profile-cta{
    display:flex;gap:8px;padding:14px 16px 14px;background:#fff;
    border-bottom:8px solid var(--bg);
  }
  .btn-primary{
    flex:1;background:var(--blue);color:#fff;
    font-weight:700;font-size:15px;padding:9px 12px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .btn-primary:active{background:var(--blue-dark);}
  .btn-primary svg{width:18px;height:18px;}
  .btn-ghost{
    flex:1;background:var(--divider);color:var(--text);
    font-weight:700;font-size:15px;padding:9px 12px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .btn-ghost:active{background:#d8dadf;}
  .btn-ghost svg{width:16px;height:16px;}
  .btn-icon{
    width:38px;flex:0 0 auto;background:var(--divider);border-radius:8px;
    display:flex;align-items:center;justify-content:center;color:var(--text);
  }
  .btn-icon:active{background:#d8dadf;}
  .btn-icon svg{width:18px;height:18px;}

  .profile-tabs{
    background:#fff;display:flex;gap:4px;
    padding:8px 8px 4px;border-bottom:1px solid var(--divider);
    overflow-x:auto;
  }
  .profile-tabs button{
    padding:8px 14px;font-size:14px;font-weight:600;color:var(--text-2);
    border-radius:6px;white-space:nowrap;
  }
  .profile-tabs button.active{color:var(--blue);background:var(--blue-light);}

  .profile-photos{
    background:#fff;padding:12px 14px;
    border-bottom:8px solid var(--bg);
  }
  .profile-photos .ttl{font-weight:700;font-size:16px;margin-bottom:8px;}
  .profile-photos-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:3px;
  }
  .profile-photos-grid div{
    aspect-ratio:1;background:#e4e6eb;overflow:hidden;
  }
  .profile-photos-grid img{width:100%;height:100%;object-fit:cover;}

  .profile-friends-block{
    background:#fff;padding:12px 14px;
    border-bottom:8px solid var(--bg);
  }
  .profile-friends-block .ttl{
    font-weight:700;font-size:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;
  }
  .profile-friends-block .sub{font-size:13px;color:var(--text-2);margin-bottom:10px;}
  .friend-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .friend-item{}
  .friend-item .ph{aspect-ratio:1;border-radius:8px;overflow:hidden;background:#e4e6eb;}
  .friend-item .ph img{width:100%;height:100%;object-fit:cover;}
  .friend-item .nm{font-size:13px;font-weight:600;margin-top:5px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .profile-post{
    background:#fff;margin-bottom:8px;padding:12px 0 4px;
  }
  .profile-post .head{display:flex;align-items:center;gap:10px;padding:0 14px 8px;}
  .profile-post .when{font-size:12px;color:var(--text-2);margin-top:1px;
    display:flex;align-items:center;gap:4px;}
  .profile-post .when svg{width:11px;height:11px;}
  .profile-post .text{font-size:15px;line-height:1.4;color:var(--text);padding:0 14px 10px;}

  /* ===== Chat ===== */
  .chat-header{
    flex:0 0 auto;background:#fff;
    padding: max(env(safe-area-inset-top),10px) 8px 10px;
    display:flex;align-items:center;gap:8px;
    border-bottom:1px solid var(--divider);
  }
  .chat-header .who{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
  .chat-header .avatar{width:36px;height:36px;}
  .chat-header .n{font-weight:700;font-size:15px;}
  .chat-header .s{font-size:11.5px;color:var(--text-2);margin-top:-1px;
    display:flex;align-items:center;gap:4px;}
  .chat-header .dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;}
  .chat-actions{display:flex;gap:2px;color:var(--blue);}
  .chat-actions button{
    width:38px;height:38px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
  }
  .chat-actions button:active{background:var(--hover);}
  .chat-actions svg{width:22px;height:22px;}

  .chat-body{
    flex:1;overflow-y:auto;padding:14px 10px 10px;
    background:#fff;
    display:flex;flex-direction:column;gap:3px;
  }
  .chat-day{
    align-self:center;font-size:11.5px;color:var(--text-2);
    padding:4px 10px;margin:6px 0;font-weight:600;
  }
  .bubble{
    max-width:78%;padding:8px 12px;
    font-size:15px;line-height:1.35;word-wrap:break-word;
    border-radius:18px;
  }
  .bubble.me{align-self:flex-end;background:var(--blue);color:#fff;}
  .bubble.them{align-self:flex-start;background:var(--divider);color:var(--text);}

  .chat-input{

  .chat-input .icons svg{width:22px;height:22px;}
  .chat-input .field{
    flex:1;display:flex;align-items:center;gap:6px;
    background:var(--divider);border-radius:18px;padding:6px 10px 6px 14px;
  }
  .chat-input textarea{
    flex:1;resize:none;border:0;outline:0;background:transparent;
    font-size:15px;line-height:1.35;
    max-height:110px;min-height:24px;padding:4px 0;
  }
  .send-btn{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:var(--blue);
  }
  .send-btn svg{width:22px;height:22px;}
